<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Fusion High</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        
        <!-- Step 1: Request OTP -->
        <div id="step1">
            <p>Please enter your registered email address or learner number to receive a verification code.</p>
            <input type="text" id="email" placeholder="Email Address or Learner Number" required>
            <button onclick="requestOTP()">Get Reset Code</button>
        </div>

        <!-- Step 2: Verify and Reset -->
        <div id="step2" class="hidden">
            <p>Enter the verification code sent to your recovery email.</p>
            <input type="text" id="otp" placeholder="Verification Code" maxlength="6" required>
            <button onclick="verifyOTP()">Verify Code</button>
        </div>

        <!-- Step 3: Change Password -->
        <div id="step3" class="hidden">
            <p>Choose a new password.</p>
            <input type="password" id="newPassword" placeholder="New Password" required style="margin-bottom: 5px;">
            <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" required>
            <button onclick="resetPassword()">Update Password</button>
        </div>

        <div id="status-msg"></div>
        <a href="/" class="nav-link">Return to Login</a>
    </div>

    <script>
        const statusMsg = document.getElementById('status-msg');

        async function requestOTP() {
            const emailInput = document.getElementById('email');
            const btn = document.querySelector('#step1 button');
            
            if (!emailInput.value) {
                statusMsg.innerText = "Please enter your email or learner number.";
                statusMsg.style.color = "#e74c3c";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput.value, identifier: emailInput.value })
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    statusMsg.style.color = '#27ae60';
                } else {
                    statusMsg.style.color = '#e74c3c';
                }
                statusMsg.innerText = data.message || data.error;
            } catch (err) {
                statusMsg.innerText = "Connection error. Is the server running?";
                statusMsg.style.color = '#e74c3c';
            } finally {
                btn.disabled = false;
                btn.innerText = "Get Reset Code";
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('otp').value;
            const btn = document.querySelector('#step2 button');

            btn.disabled = true;
            btn.innerText = "Verifying...";

            try {
                const response = await fetch('/api/verify-reset-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, identifier: email, code })
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                    statusMsg.style.color = '#27ae60';
                } else {
                    statusMsg.style.color = '#e74c3c';
                }
                statusMsg.innerText = data.message || data.error;
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "Connection error. Check console.";
                statusMsg.style.color = '#e74c3c';
            } finally {
                btn.disabled = false;
                btn.innerText = "Verify Code";
            }
        }

        async function resetPassword() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('otp').value;
            const new_password = document.getElementById('newPassword').value;
            const confirm_password = document.getElementById('confirmNewPassword').value;

            if (new_password !== confirm_password) {
                statusMsg.innerText = "Passwords do not match.";
                statusMsg.style.color = '#e74c3c';
                return;
            }

            const response = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, identifier: email, code, new_password })
            });
            const data = await response.json();
            statusMsg.style.color = response.ok ? '#27ae60' : '#e74c3c';
            statusMsg.innerText = data.message || data.error;
            if (response.ok) {
                setTimeout(() => window.location.href = '/', 3000);
            }
        }
    </script>
</body>
</html>
